[pytest]
# Pytest configuration for AdviseMe project

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Markers for categorizing tests
markers =
    property_test: Property-based tests using Hypothesis
    unit: Unit tests for specific functionality
    integration: Integration tests across modules
    slow: Tests that take significant time to run
    auth: Authentication-related tests
    database: Database-related tests
    history: History management tests

# Hypothesis settings for property-based testing
# Profile: default - 100 examples per test
# Profile: ci - 200 examples for continuous integration
# Profile: dev - 10 examples for quick development feedback
# Profile: thorough - 1000 examples for comprehensive testing

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov-report=term-missing
    --cov-report=html

# Test paths
testpaths = .

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Coverage options
[coverage:run]
source = .
omit = 
    */tests/*
    */test_*.py
    */.venv/*
    */venv/*
    setup.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
